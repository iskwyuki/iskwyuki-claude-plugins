name: Sync upstream skills (mattpocock/skills)

on:
  schedule:
    - cron: "0 21 * * *" # 06:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: mattpocock/skills
  UPSTREAM_REF: main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream files per manifest
        run: |
          set -euo pipefail
          while read -r src dest; do
            case "$src" in ""|\#*) continue ;; esac
            mkdir -p "$(dirname "$dest")"
            curl -fsSL "https://raw.githubusercontent.com/${UPSTREAM_REPO}/${UPSTREAM_REF}/${src}" -o "$dest"
          done < .github/upstream-skills.manifest

      - name: Create sync PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-upstream-skills
          delete-branch: true
          commit-message: "chore: mattpocock/skills 上流変更を選別ミラーへ同期"
          title: "chore: mattpocock/skills 上流変更の取り込み"
          body: |
            `.github/workflows/sync-upstream-skills.yml` による自動同期 PR です。
            上流 [mattpocock/skills](https://github.com/mattpocock/skills) の変更を `.github/upstream-skills.manifest` の対象に反映しました。

            マージ後は各プロジェクトで `/pull-assets` を実行すると反映されます。
